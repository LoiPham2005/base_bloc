name: smart_bloc
description: >
  A powerful, codegen-free BLoC/Cubit layer for Flutter: sealed BaseState,
  SmartCubit/SmartBloc with stale-result protection and one-shot UI effects,
  generation-safe ref-counted lifecycle (BlocManager), and batteries-included
  widgets — autoDispose and family ergonomics without build_runner.
version: 0.3.0
# TODO: fill in before publishing to pub.dev
# homepage: https://github.com/YOUR_GITHUB/smart_bloc
# repository: https://github.com/YOUR_GITHUB/smart_bloc

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ">=8.1.0 <10.0.0"
  equatable: ">=2.0.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ">=9.0.0 <11.0.0"
  fake_async: ">=1.3.0 <2.0.0"
  flutter_lints: ">=3.0.0 <6.0.0"
  mocktail: ">=1.0.0 <2.0.0"

topics:
  - bloc
  - cubit
  - state-management
  - flutter
  - architecture
