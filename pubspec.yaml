name: smart_bloc
description: >-
  Codegen-free BLoC/Cubit layer for Flutter: sealed async state, query/mutate
  with stale-result protection, one-shot UI effects, and ref-counted
  autoDispose lifecycle.
version: 0.3.2
homepage: https://github.com/LoiPham2005/smart_bloc
repository: https://github.com/LoiPham2005/smart_bloc
issue_tracker: https://github.com/LoiPham2005/smart_bloc/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ">=8.1.0 <10.0.0"
  equatable: ">=2.0.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ">=9.0.0 <11.0.0"
  fake_async: ">=1.3.0 <2.0.0"
  flutter_lints: ">=3.0.0 <6.0.0"
  mocktail: ">=1.0.0 <2.0.0"

topics:
  - bloc
  - cubit
  - state-management
  - flutter
  - architecture
